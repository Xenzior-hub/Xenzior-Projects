<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Password-Generator</title>
</head>
<body>
    
    <div class="container">
        <div class="hero-section">
            <h1>Generator a<br><span>Random Passoword</span></h1>
            <p>Never use an insecure password again.</p>
            <button class="generate-btn" onclick="generatebtn()">Generate passwords</button>
            <hr class="faded-line">
            <div class="info-box">
                <div class="text-box-container">
                    <div class="text-box" id="first-inbox"></div>
                    <button class="copy-btn" id="first-copy-btn" onclick="firstcopy()">Copy</button>
                </div>
                <div class="text-box-container">
                    <div class="text-box" id="second-inbox"></div>
                    <button class="copy-btn" id="second-copy-btn" onclick="secondcopy()">Copy</button>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
