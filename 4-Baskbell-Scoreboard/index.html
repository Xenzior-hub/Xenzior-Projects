<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <title>Baskbell-Scoreborad</title>
</head>
<body>
    <div class="container">
        <div class="column">
            <h3>Guest</h3>
            <h2 class="score" id="home-count-el">0</h2>
            <div>
                <button class="count-btn" onclick="plusoneHome()">+1</button>
                <button class="count-btn" onclick="plustwoHome()">+2</button>
                <button class="count-btn" onclick="plusthreeHome()">+3</button>
            </div>
            <button class="reset-btn" onclick="resetHome()">Reset</button>
        </div>

        <div class="column">
            <h3>Home</h3>
            <h2 class="score" id="guest-el">0</h2>
            <div>
                <button class="count-btn" onclick="plusoneGuest()">+1</button>
                <button class="count-btn" onclick="plustwoGuest()">+2</button>
                <button class="count-btn" onclick="plusthreeGuest()">+3</button>
            </div>
            <button class="reset-btn" onclick="resetGuest()">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
