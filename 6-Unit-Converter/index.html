<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Unit-Converter</title>
</head>
<body>
    
    <div class="container">
        <div id="header">
            <h1>Metric/Imperial Unit Conversion</h1>
            <input id="digital-number" type="text" inputmode="numeric" autocomplete="off" maxlength="10"/>
            <button id="convert-btn">Convert</button>
        </div>
        <div id="botton">
            <div class="result-tab" id="lenght-tab">
                <h3>Length (Meter/Feet)</h3>
                <p id="lenght-result">0 meters = 0 feet | 0 feet = 0 meters</p>
            </div>
            <div class="result-tab" id="volume-tab">
                <h3>Volume (Liters/Gallons)</h3>
                <p id="volume-result">0 liters = 0 gallons | 0 gallons = 0 liters</p>
            </div>
            <div class="result-tab" id="mass-tab">
                <h3>Mass (Kilograms/Pounds)</h3>
                <p id="mass-result">0 kilos = 0 pounds | 0 pounds = 0 kilos</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
